services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexaflow
      POSTGRES_USER: nexaflow
      POSTGRES_PASSWORD: nexaflow
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: nexaflow
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - chdata:/var/lib/clickhouse

  api-server:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: deploy/api-server.Dockerfile
    environment:
      NEXAFLOW_API_ADDR: 0.0.0.0:8080
      NEXAFLOW_CLICKHOUSE_URL: http://default:nexaflow@clickhouse:8123
      NEXAFLOW_REDIS_ADDR: redis:6379
      NEXAFLOW_MODE: ${NEXAFLOW_MODE:-live_pcap}
      NEXAFLOW_IFACE: ${NEXAFLOW_IFACE:-eth0}
      NEXAFLOW_RUNTIME_CONFIG: /var/lib/nexaflow/collector_config.json
      NEXAFLOW_HOST_NET_PATH: /host/sys/class/net
      NEXAFLOW_AUTH_PASSWORD: ${NEXAFLOW_AUTH_PASSWORD:-}
      NEXAFLOW_AUTH_READONLY_PASSWORD: ${NEXAFLOW_AUTH_READONLY_PASSWORD:-}
      NEXAFLOW_AUTH_SECRET: ${NEXAFLOW_AUTH_SECRET:-}
      NEXAFLOW_AI_MODE: ${NEXAFLOW_AI_MODE:-local_mock}
      NEXAFLOW_AI_PROVIDER: ${NEXAFLOW_AI_PROVIDER:-local_mock}
      NEXAFLOW_AI_MODEL: ${NEXAFLOW_AI_MODEL:-nexaflow-local-summary}
      NEXAFLOW_AI_BASE_URL: ${NEXAFLOW_AI_BASE_URL:-}
      NEXAFLOW_AI_API_KEY: ${NEXAFLOW_AI_API_KEY:-}
      NEXAFLOW_AI_MAX_CONTEXT_ROWS: ${NEXAFLOW_AI_MAX_CONTEXT_ROWS:-12}
    volumes:
      - ../runtime:/var/lib/nexaflow
      - /sys:/host/sys:ro
    depends_on:
      - clickhouse
      - redis
      - postgres
    ports:
      - "127.0.0.1:8080:8080"

  collector:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: deploy/collector.Dockerfile
    environment:
      NEXAFLOW_CLICKHOUSE_URL: http://default:nexaflow@127.0.0.1:8123
      NEXAFLOW_REDIS_ADDR: 127.0.0.1:6379
      NEXAFLOW_MODE: ${NEXAFLOW_MODE:-live_pcap}
      NEXAFLOW_IFACE: ${NEXAFLOW_IFACE:-eth0}
      NEXAFLOW_SOURCE_ID: ${NEXAFLOW_SOURCE_ID:-live-eth0}
      NEXAFLOW_BPF_FILTER: ${NEXAFLOW_BPF_FILTER:-ip or ip6}
      NEXAFLOW_SESSION_TOPN: ${NEXAFLOW_SESSION_TOPN:-500}
      NEXAFLOW_RUNTIME_CONFIG: /var/lib/nexaflow/collector_config.json
    volumes:
      - ../runtime:/var/lib/nexaflow
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    depends_on:
      - clickhouse
      - redis

  web:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
    depends_on:
      - api-server
    ports:
      - "80:80"
      - "8081:80"

volumes:
  pgdata:
  chdata:
