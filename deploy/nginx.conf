server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        set $api_upstream http://api-server:8080;
        proxy_pass $api_upstream;
    }

    location /healthz {
        set $api_upstream http://api-server:8080;
        proxy_pass $api_upstream;
    }

    location /readyz {
        set $api_upstream http://api-server:8080;
        proxy_pass $api_upstream;
    }

    location /metrics {
        set $api_upstream http://api-server:8080;
        proxy_pass $api_upstream;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
